version: "3.9"
services:
  urp-control:
    image: ghcr.io/urp-dev/urp-control:dev
    command: ["urp-control", "--config", "/etc/urp/config.yaml"]
    ports:
      - "8080:8080"
    environment:
      URP_MANIFEST_STORE: postgres://urp:urp@postgres:5432/urp
      URP_LEDGER_STORE: postgres://urp:urp@postgres:5432/urp
    depends_on:
      - postgres
  urp-ai-gateway:
    image: ghcr.io/urp-dev/urp-ai-gateway:dev
    ports:
      - "8081:8080"
    environment:
      URP_CONTROL_URL: http://urp-control:8080
  urp-s3-gateway:
    image: ghcr.io/urp-dev/urp-s3-gateway:dev
    ports:
      - "9000:9000"
    environment:
      URP_CONTROL_URL: http://urp-control:8080
      URP_BACKEND_OBJECT_STORE: s3://example-backend
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: urp
      POSTGRES_PASSWORD: urp
      POSTGRES_DB: urp
    ports:
      - "5432:5432"
