name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: PYTHONPATH=src/python python -m unittest discover -s tests -v
