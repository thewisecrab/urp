name: urp-example

x-urp-service: &urp-service
  build:
    context: ..
    dockerfile: deployments/docker/Dockerfile
  image: urp-local:0.1.0
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop: ["ALL"]
  environment: &urp-environment
    URP_MODE: ${URP_MODE:-observe}
    URP_LOCAL_API_KEY: ${URP_LOCAL_API_KEY:?Set URP_LOCAL_API_KEY}
    URP_MANIFEST_STORE: postgresql://urp:${URP_POSTGRES_PASSWORD:?Set URP_POSTGRES_PASSWORD}@postgres:5432/urp
    URP_LEDGER_STORE: postgresql://urp:${URP_POSTGRES_PASSWORD:?Set URP_POSTGRES_PASSWORD}@postgres:5432/urp
  volumes:
    - urp-state:/var/lib/urp/.urp
  depends_on:
    postgres:
      condition: service_healthy

services:
  control-plane:
    <<: *urp-service
    command: ["service", "run", "--name", "control-plane", "--listen", "0.0.0.0:8080"]
    ports: ["127.0.0.1:8080:8080"]

  gateway-ai:
    <<: *urp-service
    command: ["service", "run", "--name", "gateway-ai", "--listen", "0.0.0.0:8080"]
    ports: ["127.0.0.1:8081:8080"]

  gateway-s3:
    <<: *urp-service
    command: ["service", "run", "--name", "gateway-s3", "--listen", "0.0.0.0:8080"]
    ports: ["127.0.0.1:9000:8080"]

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: urp
      POSTGRES_PASSWORD: ${URP_POSTGRES_PASSWORD:?Set URP_POSTGRES_PASSWORD}
      POSTGRES_DB: urp
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urp -d urp"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

volumes:
  urp-state: {}
  postgres-data: {}
