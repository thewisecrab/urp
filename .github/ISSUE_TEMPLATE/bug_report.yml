name: Bug report
description: Report a reproducible URP defect without sensitive data.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tenant payloads, prompts, or unredacted manifests. Use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Core runtime or CLI
        - Control plane API
        - AI gateway
        - S3 gateway
        - Policy, verifier, or security
        - SDK
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include redacted commands, inputs, and configuration.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, deployment mode, and relevant tool versions.
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, private payloads, prompts, and unredacted manifests.
          required: true
