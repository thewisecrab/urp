name: Feature request
description: Propose a capability with contract, verification, and adoption context.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user or operator problem, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Contract and verification
      description: State what must remain true, how it will be verified, and the safe fallback.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Expected impact and evidence
      description: Explain how impact would be measured without overstating assumptions.
  - type: checkboxes
    id: principles
    attributes:
      label: URP principles
      options:
        - label: The proposal preserves tenant isolation.
          required: true
        - label: Higher-risk behavior is policy gated.
          required: true
        - label: Failure has an explicit baseline fallback.
          required: true
