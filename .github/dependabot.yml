version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-development:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /typescript
    schedule:
      interval: weekly
    groups:
      typescript-sdk:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: /go
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /deployments/docker
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
