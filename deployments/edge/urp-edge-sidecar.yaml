apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: urp-edge-sidecar
  labels:
    app.kubernetes.io/name: urp-edge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: urp-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: urp-edge
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: urp-edge
          image: ghcr.io/thewisecrab/urp:0.1.0
          ports:
            - containerPort: 8081
          args: ["service", "run", "--name", "gateway-ai", "--listen", "0.0.0.0:8081"]
          env:
            - name: URP_EDGE_MODE
              value: "true"
            - name: URP_POLICY_CACHE
              value: /var/lib/urp-edge/policies
            - name: URP_LOCAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: api-key
          volumeMounts:
            - name: urp-edge-state
              mountPath: /var/lib/urp-edge
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: urp-edge-state
          hostPath:
            path: /var/lib/urp-edge
            type: DirectoryOrCreate
