apiVersion: apps/v1
kind: Deployment
metadata:
  name: urp-control-plane
  labels:
    app.kubernetes.io/name: urp
    app.kubernetes.io/component: control-plane
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: urp
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: urp
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: urp-control-plane
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: ghcr.io/thewisecrab/urp:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["service", "run", "--name", "control-plane", "--listen", "0.0.0.0:8080"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: URP_MODE
              value: observe
            - name: URP_LOCAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: api-key
            - name: URP_MANIFEST_STORE
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: postgres-dsn
            - name: URP_LEDGER_STORE
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: postgres-dsn
          volumeMounts:
            - name: state
              mountPath: /var/lib/urp/.urp
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 2
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: urp-state
---
apiVersion: v1
kind: Service
metadata:
  name: urp-control-plane
spec:
  selector:
    app.kubernetes.io/name: urp
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: urp-control-plane
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: urp-state
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: urp-control-plane
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: urp
      app.kubernetes.io/component: control-plane
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: urp-control-plane
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: urp
      app.kubernetes.io/component: control-plane
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
