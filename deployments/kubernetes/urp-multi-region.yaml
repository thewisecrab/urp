apiVersion: v1
kind: ConfigMap
metadata:
  name: urp-multi-region
data:
  primary_region: us-east-1
  failover_mode: observe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urp-ai-gateway-multi-region
  labels:
    app.kubernetes.io/name: urp
    app.kubernetes.io/component: gateway-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: urp
      app.kubernetes.io/component: gateway-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: urp
        app.kubernetes.io/component: gateway-ai
    spec:
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/region
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: urp
              app.kubernetes.io/component: gateway-ai
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway-ai
          image: ghcr.io/thewisecrab/urp:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["service", "run", "--name", "gateway-ai", "--listen", "0.0.0.0:8080"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: URP_MODE
              valueFrom:
                configMapKeyRef:
                  name: urp-multi-region
                  key: failover_mode
            - name: URP_MULTI_REGION
              value: "true"
            - name: URP_PRIMARY_REGION
              valueFrom:
                configMapKeyRef:
                  name: urp-multi-region
                  key: primary_region
            - name: URP_LOCAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: api-key
            - name: URP_MANIFEST_STORE
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: postgres-dsn
            - name: URP_LEDGER_STORE
              valueFrom:
                secretKeyRef:
                  name: urp-runtime
                  key: postgres-dsn
          volumeMounts:
            - name: state
              mountPath: /var/lib/urp/.urp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            timeoutSeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 2
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: state
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: urp-ai-gateway
spec:
  selector:
    app.kubernetes.io/name: urp
    app.kubernetes.io/component: gateway-ai
  ports:
    - name: http
      port: 8080
      targetPort: http
