apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: urpcontrolplanes.urp.dev
spec:
  group: urp.dev
  scope: Namespaced
  names:
    plural: urpcontrolplanes
    singular: urpcontrolplane
    kind: URPControlPlane
    shortNames: ["urp"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Mode
          type: string
          jsonPath: .spec.mode
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [mode]
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 1
                mode:
                  type: string
                  enum: [observe, shadow, enforce]
                image:
                  type: string
                  default: ghcr.io/thewisecrab/urp:0.1.0
                runtimeSecret:
                  type: string
                  default: urp-runtime
                stateClaim:
                  type: string
                  default: urp-state
            status:
              type: object
              properties:
                observedGeneration: {type: integer, format: int64}
                readyReplicas: {type: integer, format: int32}
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: urp-operator
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: urp-operator
rules:
  - apiGroups: ["urp.dev"]
    resources: ["urpcontrolplanes", "urpcontrolplanes/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: urp-operator
subjects:
  - kind: ServiceAccount
    name: urp-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: urp-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urp-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: urp-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: urp-operator
    spec:
      serviceAccountName: urp-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/thewisecrab/urp:0.1.0
          command: ["python", "-m", "urp.operator"]
          ports:
            - name: health
              containerPort: 8080
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 20
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
