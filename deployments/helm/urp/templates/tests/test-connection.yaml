apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "urp.fullname" . }}-test-connection"
  labels:
    {{- include "urp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36.1
      command: ["wget"]
      args: ["--spider", "--timeout=5", "http://{{ include "urp.fullname" . }}:{{ .Values.service.port }}/readyz"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
