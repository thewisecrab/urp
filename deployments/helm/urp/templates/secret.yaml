{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "urp.secretName" . }}
  labels:
    {{- include "urp.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ required "secrets.apiKey is required when secrets.create=true" .Values.secrets.apiKey | quote }}
  {{- if .Values.database.enabled }}
  postgres-dsn: {{ required "secrets.postgresDsn is required when database.enabled=true and secrets.create=true" .Values.secrets.postgresDsn | quote }}
  {{- end }}
  {{- with .Values.secrets.approvalSigningKey }}
  approval-signing-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.backupSigningKey }}
  backup-signing-key: {{ . | quote }}
  {{- end }}
{{- end }}
